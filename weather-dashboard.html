<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 50%; margin: auto; text-align: center; }
        .weather-card { border: 1px solid #ccc; padding: 20px; margin: 20px; border-radius: 10px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Dashboard</h1>
        <input type="text" id="locationInput" placeholder="Enter a location" />
        <button id="fetchWeatherBtn">Get Weather</button>
        <div id="weatherData" class="weather-card" style="display: none;"></div>
        <div id="errorMessage" class="error" style="display: none;"></div>
    </div>
    <script>
        document.getElementById('fetchWeatherBtn').addEventListener('click', fetchWeather);

        async function fetchWeather() {
            const location = document.getElementById('locationInput').value;
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true`);
            const data = await response.json();

            if (data.current_weather) {
                document.getElementById('weatherData').style.display = 'block';
                document.getElementById('weatherData').innerHTML = `<h2>Weather in ${location}</h2>\n                    <p>Temperature: ${data.current_weather.temperature} °C</p>\n                    <p>Wind Speed: ${data.current_weather.windspeed} km/h</p>`;
                document.getElementById('errorMessage').style.display = 'none';
            } else {
                showError('Weather data not available.');
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').innerText = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('weatherData').style.display = 'none';
        }
    </script>
</body>
</html>
